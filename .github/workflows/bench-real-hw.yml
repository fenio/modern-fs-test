name: fs-bench-real-hw

on:
  schedule:
    # The suite writes roughly 1.7 TB per run; keep hardware wear bounded.
    - cron: '43 3 * * 0'
  workflow_dispatch:

concurrency:
  group: fs-bench-real-hw
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  bench:
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_HARDWARE_BENCHMARKS == 'true'
    runs-on: [self-hosted, linux, x64, fs-benchmark]
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - fs: ext4
            layout: single
          - fs: ext4
            layout: md-raid10
          - fs: ext4
            layout: lvm-raid10
            aging_iters: 8
          - fs: xfs
            layout: single
          - fs: xfs
            layout: md-raid10
          - fs: xfs
            layout: lvm-raid10
            aging_iters: 8
          - fs: xfs
            layout: zvol
            aging_iters: 25
          - fs: xfs
            layout: lvm-raid10-int
            aging_iters: 8
          - fs: ext4
            layout: md-raid6
          - fs: btrfs
            layout: raid1
          - fs: btrfs
            layout: raid6
          - fs: btrfs
            layout: single
          - fs: zfs
            layout: mirror
            aging_iters: 10
          - fs: zfs
            layout: mirror-8k
          - fs: zfs
            layout: single
            dev_size: 32G
            aging_iters: 10
          - fs: zfs
            layout: raidz2
            aging_iters: 10
          - fs: zfs
            layout: raidz1
            aging_iters: 10
          - fs: zfs
            layout: raidz1-enc
            aging_iters: 10
          - fs: zfs
            layout: raidz2-enc
            aging_iters: 10
          - fs: bcachefs
            layout: replicas2
          - fs: bcachefs
            layout: single
          - fs: bcachefs
            layout: ec
          - fs: zfs
            layout: mirror-enc
            aging_iters: 10
          - fs: bcachefs
            layout: replicas2-enc
          - fs: btrfs
            layout: raid1-luks
          - fs: ext4
            layout: md-raid10-luks
    env:
      DEV_SIZE: ${{ matrix.dev_size || '16G' }}
      AGING_ITERS: ${{ matrix.aging_iters || '100' }}
      AGING_IO: 64M
      SNAPSCALE_COUNT: 500
      CALIB_MIN_SEQ_MBPS: 300
      CALIB_MIN_RAND_IOPS: 8000
    steps:
      - uses: actions/checkout@v7

      - name: Run benchmark through managed wrapper
        run: |
          runner=$(command -v modern-fs-benchmark-run) || {
            echo 'managed benchmark wrapper is not installed' >&2
            exit 1
          }
          sudo "$runner" --capabilities | grep -qx hardware-random-scaling-v2 || {
            echo 'managed benchmark wrapper does not support hardware random scaling' >&2
            exit 1
          }
          sudo "$runner" \
            "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" \
            "${{ matrix.fs }}" "${{ matrix.layout }}" \
            "$DEV_SIZE" "$AGING_ITERS" "$AGING_IO" "$SNAPSCALE_COUNT" \
            "$CALIB_MIN_SEQ_MBPS" "$CALIB_MIN_RAND_IOPS"
          mkdir -p results
          cp -a "/var/lib/modern-fs-benchmark/results/$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT/${{ matrix.fs }}-${{ matrix.layout }}/." results/

      - name: Write job summary
        if: always()
        run: scripts/summarize.sh results/result-*.json >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hardware-results-${{ matrix.fs }}-${{ matrix.layout }}
          path: results/
          if-no-files-found: ignore

  publish:
    name: Store hardware results
    needs: bench
    if: ${{ !cancelled() && needs.bench.result != 'skipped' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-26.04
    permissions:
      contents: write
    concurrency:
      group: results-real-hw
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          pattern: hardware-results-*
          path: incoming
          merge-multiple: true

      - name: Validate complete hardware result set
        run: python3 scripts/validate-result.py --complete-set incoming/result-*.json

      - name: Verify hardware provenance
        run: |
          jq -e -s \
            'all(.[];
              (.devices | type == "string" and startswith("/dev/")) and
              ([.results.randwrite8_iops, .results.randwrite16_iops,
                .results.randwrite4_sharded_iops,
                .results.randwrite8_sharded_iops,
                .results.randwrite16_sharded_iops,
                .results.randread8_iops, .results.randread16_iops] |
               all(.[]; type == "number" and . >= 0)))' \
            incoming/result-*.json >/dev/null

      - name: Append results to hardware history branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          set +e
          git ls-remote --exit-code --heads origin results-real-hw >/dev/null 2>&1
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            git fetch origin results-real-hw
            git worktree add hardware-data origin/results-real-hw
            git -C hardware-data checkout -B results-real-hw
          elif [ "$status" -eq 2 ]; then
            git worktree add --detach hardware-data
            git -C hardware-data checkout --orphan results-real-hw
            git -C hardware-data rm -rf --quiet . || true
          else
            echo "failed to query results-real-hw (git exit $status)" >&2
            exit "$status"
          fi
          mkdir -p "hardware-data/runs/${{ github.run_number }}"
          cp incoming/result-*.json "hardware-data/runs/${{ github.run_number }}/"
          cp LICENSE-DATA hardware-data/LICENSE
          git -C hardware-data add LICENSE runs
          git -C hardware-data commit -m "hardware results from run ${{ github.run_id }}" || echo "nothing new"
          git -C hardware-data push origin results-real-hw
