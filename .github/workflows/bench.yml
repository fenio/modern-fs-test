name: fs-bench

on:
  push:
    branches: [main]
    # docs-only commits must not trigger (or, via the concurrency group,
    # CANCEL) benchmark runs - a README push once killed a 23-job run
    paths-ignore:
      - '**.md'
  schedule:
    - cron: '17 */2 * * *'  # every 2 hours at :17 (GitHub may delay/skip under load)
  workflow_dispatch:
    inputs:
      runs_on:
        description: 'Runner label override (use your self-hosted label for real hardware)'
        default: ''
      devices:
        description: 'Real block devices, space-separated (e.g. "/dev/sdb /dev/sdc /dev/sdd /dev/sde"). THEY WILL BE WIPED. Empty = loop devices.'
        default: ''

# A newer push supersedes older push runs (their code is stale anyway);
# cron/dispatch runs keep unique groups and never cancel each other.
concurrency:
  group: fs-bench-${{ github.event_name == 'push' && 'push' || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

permissions:
  contents: read

jobs:
  bench:
    runs-on: ${{ inputs.runs_on || 'ubuntu-26.04' }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - fs: ext4
            layout: single
          - fs: ext4
            layout: md-raid10
          - fs: ext4
            layout: lvm-raid10
            # dm-snapshot copies each origin write into every snapshot
            # lacking it, and each snapshot pre-allocates VG space — 100
            # old-style LVM snapshots is unusable by design
            aging_iters: 8
          - fs: xfs
            layout: single
          - fs: xfs
            layout: md-raid10
          - fs: xfs
            layout: lvm-raid10
            aging_iters: 8
          - fs: xfs
            layout: zvol
            aging_iters: 25
          - fs: xfs
            layout: lvm-raid10-int
            aging_iters: 8
          - fs: ext4
            layout: md-raid6
          - fs: btrfs
            layout: raid1
          - fs: btrfs
            layout: raid6
          - fs: btrfs
            layout: single
          - fs: zfs
            layout: mirror
            # 128K recordsize pins ~the whole aging file per snapshot —
            # ~10 snapshots is what this pool size honestly affords
            aging_iters: 10
          - fs: zfs
            layout: mirror-8k
          - fs: zfs
            layout: single
            # one device = 16G usable; 128K-recordsize snapshot retention
            # needs more or the pool exhausts mid-aging
            dev_size: 32G
            aging_iters: 10
          - fs: zfs
            layout: raidz2
            # default recordsize — same snapshot-retention math as mirror
            aging_iters: 10
          - fs: zfs
            layout: raidz1
            aging_iters: 10
          # raidz + native encryption (community request): parity math and
          # AES-256-GCM stack, vs mirror-enc which pays only the crypto
          - fs: zfs
            layout: raidz1-enc
            aging_iters: 10
          - fs: zfs
            layout: raidz2-enc
            aging_iters: 10
          - fs: bcachefs
            layout: replicas2
          - fs: bcachefs
            layout: single
          - fs: bcachefs
            layout: ec
          # encryption variants: native vs one-LUKS-per-device vs LUKS-over-raid
          - fs: zfs
            layout: mirror-enc
            aging_iters: 10
          - fs: bcachefs
            layout: replicas2-enc
          - fs: btrfs
            layout: raid1-luks
          - fs: ext4
            layout: md-raid10-luks
    env:
      BENCH_DEVICES: ${{ inputs.devices }}
      BENCH_WIPE: ${{ inputs.devices != '' && '1' || '0' }}
      DEV_SIZE: ${{ matrix.dev_size || '16G' }}
      AGING_ITERS: ${{ matrix.aging_iters || '100' }}
      AGING_IO: 64M
      SNAPSCALE_COUNT: 500
      # fail fast on slow shared VMs (normal runners: ~400 MB/s, ~14.5k IOPS)
      CALIB_MIN_SEQ_MBPS: 300
      CALIB_MIN_RAND_IOPS: 8000
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: sudo scripts/install-deps.sh ${{ matrix.fs }}

      - name: Run benchmark
        run: |
          sudo --preserve-env=BENCH_DEVICES,BENCH_WIPE,DEV_SIZE,AGING_ITERS,AGING_IO,SNAPSCALE_COUNT,CALIB_MIN_SEQ_MBPS,CALIB_MIN_RAND_IOPS \
            RESULTS_DIR="$PWD/results" \
            scripts/run-bench.sh ${{ matrix.fs }} ${{ matrix.layout }}

      - name: Write job summary
        if: always()
        run: scripts/summarize.sh results/result-*.json >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results-${{ matrix.fs }}-${{ matrix.layout }}
          path: results/
          if-no-files-found: ignore

  publish:
    name: Publish dashboard
    needs: bench
    if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-26.04
    permissions:
      contents: write
      pages: write
      id-token: write
      actions: write  # to drop stale github-pages artifacts on reruns
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          pattern: results-*
          path: incoming
          merge-multiple: true

      # Failed matrix attempts may still reach publish; keep their partial
      # artifacts out of history until a retry supplies the full matrix.
      - name: Validate complete result set
        run: python3 scripts/validate-result.py --complete-set incoming/result-*.json

      - name: Append results to history branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin results-data >/dev/null 2>&1; then
            git fetch origin results-data
            git worktree add data origin/results-data
            git -C data checkout -B results-data
          else
            git worktree add --detach data
            git -C data checkout --orphan results-data
            git -C data rm -rf --quiet . || true
          fi
          mkdir -p "data/runs/${{ github.run_number }}"
          cp incoming/result-*.json "data/runs/${{ github.run_number }}/"
          git -C data add runs
          git -C data commit -m "results from run ${{ github.run_id }}" || echo "nothing new"
          git -C data push origin results-data

      - name: Build dashboard
        run: |
          python3 scripts/make-dashboard.py --runs data/runs --out site/index.html \
            --repo "https://github.com/${{ github.repository }}"

      - uses: actions/configure-pages@v6

      - name: Drop stale pages artifacts from earlier attempts
        # each rerun uploads another "github-pages" artifact and
        # deploy-pages refuses when it finds more than one
        run: |
          for id in $(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts?per_page=100" \
                        --jq '.artifacts[] | select(.name == "github-pages") | .id'); do
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy dashboard
    needs: publish
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-26.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
