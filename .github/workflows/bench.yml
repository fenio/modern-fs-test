name: fs-bench

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'  # weekly, Monday 04:17 UTC
  workflow_dispatch:
    inputs:
      runs_on:
        description: 'Runner label override (use your self-hosted label for real hardware)'
        default: ''
      devices:
        description: 'Real block devices, space-separated (e.g. "/dev/sdb /dev/sdc /dev/sdd /dev/sde"). THEY WILL BE WIPED. Empty = loop devices.'
        default: ''

permissions:
  contents: read

jobs:
  bench:
    runs-on: ${{ inputs.runs_on || 'ubuntu-26.04' }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - fs: ext4
            layout: single
          - fs: ext4
            layout: md-raid10
          - fs: ext4
            layout: lvm-raid10
          - fs: xfs
            layout: single
          - fs: xfs
            layout: md-raid10
          - fs: xfs
            layout: lvm-raid10
          - fs: btrfs
            layout: raid1
          - fs: btrfs
            layout: single
          - fs: zfs
            layout: mirror
          - fs: zfs
            layout: mirror-8k
          - fs: zfs
            layout: single
          - fs: bcachefs
            layout: replicas2
          - fs: bcachefs
            layout: single
    env:
      BENCH_DEVICES: ${{ inputs.devices }}
      BENCH_WIPE: ${{ inputs.devices != '' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: sudo scripts/install-deps.sh ${{ matrix.fs }}

      - name: Run benchmark
        run: |
          sudo --preserve-env=BENCH_DEVICES,BENCH_WIPE \
            RESULTS_DIR="$PWD/results" \
            scripts/run-bench.sh ${{ matrix.fs }} ${{ matrix.layout }}

      - name: Write job summary
        if: always()
        run: scripts/summarize.sh results/result-*.json >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results-${{ matrix.fs }}-${{ matrix.layout }}
          path: results/
          if-no-files-found: ignore

  publish:
    name: Publish dashboard
    needs: bench
    if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-26.04
    permissions:
      contents: write
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          pattern: results-*
          path: incoming
          merge-multiple: true

      - name: Append results to history branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin results-data >/dev/null 2>&1; then
            git fetch origin results-data
            git worktree add data origin/results-data
            git -C data checkout -B results-data
          else
            git worktree add --detach data
            git -C data checkout --orphan results-data
            git -C data rm -rf --quiet . || true
          fi
          mkdir -p "data/runs/${{ github.run_number }}"
          cp incoming/result-*.json "data/runs/${{ github.run_number }}/"
          git -C data add runs
          git -C data commit -m "results from run ${{ github.run_id }}" || echo "nothing new"
          git -C data push origin results-data

      - name: Build dashboard
        run: |
          python3 scripts/make-dashboard.py --runs data/runs --out site/index.html \
            --repo "https://github.com/${{ github.repository }}"

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v5
