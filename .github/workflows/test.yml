name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  reporting:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Run regression tests
        run: python -m unittest discover -s tests -v
